{% extends "base.html" %}
{% block content %}

<style>
  /* ================= BACKGROUND ================= */

  body {
    background:
      linear-gradient(rgba(0, 0, 0, 0.60), rgba(0, 0, 0, 0.60)),
      url("/static/bg.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    animation: zoomBg 18s infinite alternate;
  }

  @keyframes zoomBg {
    0% {
      background-size: 100%;
    }

    100% {
      background-size: 110%;
    }
  }

  /* ================= MAIN CARD ================= */

  .reg-card {

    max-width: 700px;

    margin: 40px auto;

    padding: 40px;

    border-radius: 30px;

    background: rgba(255, 255, 255, 0.10);

    backdrop-filter: blur(18px);

    border: 1px solid rgba(255, 255, 255, 0.15);

    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.35);
  }

  /* ================= TITLE ================= */

  .title {

    font-size: 40px;

    font-weight: 800;

    text-align: center;

    margin-bottom: 35px;

    background:
      linear-gradient(90deg, #00c6ff, #0072ff, #7f5cff);

    -webkit-background-clip: text;

    -webkit-text-fill-color: transparent;
  }

  /* ================= LABEL ================= */

  label {

    color: white;

    font-size: 16px;

    font-weight: 700;

    margin-bottom: 8px;
  }

  /* ================= INPUT ================= */

  .form-control,
  .form-select {

    height: 56px;

    border-radius: 16px !important;

    border: none !important;

    background: rgba(255, 255, 255, 0.92) !important;

    font-size: 16px;

    box-shadow: none !important;
  }

  /* FOCUS */

  .form-control:focus,
  .form-select:focus {

    border: 2px solid #00bfff !important;

    box-shadow:
      0 0 15px rgba(0, 191, 255, 0.5) !important;
  }

  /* PLACEHOLDER */

  .form-control::placeholder {

    color: #777;
  }

  /* ================= BUTTON ================= */

  .btn-register {

    width: 100%;

    height: 58px;

    border: none;

    border-radius: 18px;

    font-size: 20px;

    font-weight: 700;

    color: white;

    margin-top: 15px;

    background:
      linear-gradient(90deg, #00b4ff, #0066ff, #7f5cff);

    transition: 0.3s;
  }

  .btn-register:hover {

    transform: translateY(-2px);

    box-shadow:
      0 10px 25px rgba(0, 119, 255, 0.4);
  }

  /* ================= ICON ================= */

  .admin-icon {

    width: 110px;

    height: 110px;

    margin: auto;

    border-radius: 50%;

    background:
      linear-gradient(135deg, #00b4ff, #0066ff, #7f5cff);

    display: flex;

    align-items: center;

    justify-content: center;

    font-size: 50px;

    color: white;

    margin-bottom: 25px;

    box-shadow:
      0 10px 25px rgba(0, 119, 255, 0.35);
  }

  /* ================= INFO BOX ================= */

  .info-box {

    margin-top: 25px;

    background: rgba(255, 255, 255, 0.08);

    border-radius: 18px;

    padding: 18px;

    color: white;

    font-size: 14px;

    line-height: 1.8;
  }

  /* ================= RESPONSIVE ================= */

  @media(max-width:768px) {

    .reg-card {
      margin: 20px;
      padding: 25px;
    }

    .title {
      font-size: 30px;
    }

  }
</style>

<div class="container">

  <div class="reg-card">

    <!-- ICON -->

    <div class="admin-icon">
      👨‍💼
    </div>

    <!-- TITLE -->

    <h2 class="title">
      Admin Registration
    </h2>

    <!-- FORM -->

    <form method="POST">

      <!-- NAME -->

      <div class="mb-4">

        <label>
          Admin Full Name
        </label>

        <input type="text" name="name" class="form-control" required placeholder="Enter admin name">

      </div>

      <!-- EMAIL -->

      <div class="mb-4">

        <label>
          Email Address
        </label>

        <input type="email" name="email" class="form-control" required placeholder="Enter admin email">

      </div>

      <!-- PASSWORD -->

      <div class="mb-4">

        <label>
          Create Password
        </label>

        <input type="password" name="password" class="form-control" required placeholder="Create admin password">

      </div>

      <!-- BRANCH -->

      <div class="mb-4">

        <label>
          Admin Branch
        </label>

        <select name="admin_branch" class="form-select" required>

          <option value="">
            Select Branch
          </option>

          <option value="CSE">
            CSE (Networks + Cybersecurity)
          </option>

          <option value="CE">
            Civil Engineering
          </option>

          <option value="ME">
            Mechanical Engineering
          </option>

          <option value="EE">
            Electrical Engineering
          </option>

          <option value="ECE">
            Electronics & Communication
          </option>

        </select>

      </div>

      <!-- SECURITY CODE -->

      <div class="mb-4">

        <label>
          🔐 Admin Security Code
        </label>

        <input type="password" name="security_code" class="form-control" placeholder="Enter Admin Security Code"
          required>

      </div>

      <!-- BUTTON -->

      <button class="btn-register">

        🚀 Register Admin

      </button>

    </form>

    <!-- INFO -->

    <div class="info-box">

      ✅ Only authorized admins can register.

      <br><br>

      🔒 Security code verification is mandatory.

      <br><br>

      📌 Admins can manage:
      <br>

      • Attendance
      <br>

      • Leave Management
      <br>

      • Student Support
      <br>

      • BEU Results
      <br>

      • Semester Controls

    </div>

  </div>

</div>

{% endblock %}
